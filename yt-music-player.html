<!DOCTYPE html>
<html>
<head>
	<title>Reproductor de Música by Faurl852</title>
	<meta charset="UTF-8">
	<link rel="icon" href="faurl4web.ico" type="image/x-icon"> <!--Icono mi web (faurl.github.io)-->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
	<style>
		body {
			margin: 0;
			padding: 20px;
			font-family: Arial, sans-serif;
			background-color: #fff2f2;
			overflow-x: hidden;
		}

		#playlist {
			list-style-type: none;
			margin: 0;
			padding: 0;
			height: 300px;
			overflow-y: scroll;
			border: 1px solid #ccc;
			padding: 10px;
		}

		#playlist button {
			display: block;
			cursor: pointer;
			padding: 5px;
			background-color: #f2f2f2;
			margin-bottom: 5px;
			border: none;
			width: 100%;
			text-align: left;
		}

		#playlist button:hover {
			background-color: #fccada;
		}

		#controls {
			margin-top: 10px;
		}

		#progress-bar {
			width: 90%;
			height: 8px;
			background-color: gray;
		}

		#progress {
			height: 100%;
			background-color: #ff7aa5;
			width: 0%;
		}
		
		#time-display {	
			transform: translateY(-60%) translateX(102%);
			margin-right: 10px;
		}

		.current-song {
			background-color: #ff8cb1 !important;
		}

		#player {
			display: none;
		}

		#loading-message {
			display: block;
			text-align: center;
			font-weight: bold;
		}
		
		/* Estilos para los botones de reproducción */
		.control-button {
			display: inline-block;
			vertical-align: middle;
			padding: 10px;
			width: 70px;
			height: 50px;
			background-color: #fccada;
			border: none;
			cursor: pointer;
			font-size: 20px;
			color: #333;
			transition: background-color 0.3s ease;
			
		}

		.control-button {
			height: 50px;
		}
		
		.control-button:hover {
			background-color: #ff8cb1;
		}

		.play-pause-button::before {
			content: "►"; <!--▶-->
			font-weight: 900;
		}

		.play-pause-button.paused::before {
			content: "ІІ";
			font-weight: 900;
		}
		
	</style>
</head>
<body>
	<h1>Pablix Music Player®</h1>
	<a>Ingresa el enlace de la playlist de YouTube:</a><br>
	<input type="text" id="playlistURL" placeholder="https://www.youtube.com/playlist?list=XXXXXXXXXXXX" oninput="validateAndLoadPlaylist()"><br><br>
	<div id="playlist"></div><br>
	
	<div id="progress-bar">
		<div id="progress"></div>
		<div id="time-display">00:00 / 00:00</div>
	</div><br>
	<div id="player"></div>
	<div id="controls">
		<button class="control-button" onclick="previousSong()"><i class="fas fa-step-backward"></i></button>
		<button class="control-button play-pause-button" onclick="togglePlayPause()"></button>
		<button class="control-button" onclick="nextSong()"><i class="fas fa-step-forward"></i></button>
	</div><br>
	
	<div id="loading-message">Cargando...</div>

	<script src="https://www.youtube.com/iframe_api"></script>
	<script>
		var player;
		var playlist = [];
		var currentSongIndex = 0;
		var progressInterval;

		var hideLoadingTimeout;

		function onYouTubeIframeAPIReady() {
			document.getElementById("player").style.display = "block";
			hideLoadingTimeout = setTimeout(function() {
				hideLoadingMessage();
			}, 0);
			loadPlaylist();
		}
		
		function hideLoadingMessage() {
			if (document.getElementById("loading-message").style.display !== "none") {
				document.getElementById("loading-message").style.display = "none";
			}
		}
		
		// Verificar si el mensaje de carga se ha ocultado automáticamente después de 3 segundos
		setTimeout(function() {
			if (document.getElementById("loading-message").style.display !== "none") {
				// Si no se ha ocultado, ocultarlo manualmente
				hideLoadingMessage();
			}
		}, 3000);
		

		function loadPlaylist() {
			var playlistURL = document.getElementById("playlistURL").value;
			var playlistId = extractPlaylistId(playlistURL);
			if (playlistId) {
				var apiUrl = "https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=" + playlistId + "&key=AIzaSyBojdH9dK2F8Dyk4mw7Ia2Y-e0zVWk_Sis";
				fetch(apiUrl)
					.then(response => response.json())
					.then(data => {
						playlist = data.items.map(item => {
							return {
								title: item.snippet.title,
								videoId: item.snippet.resourceId.videoId
							};
						});
						displayPlaylist();
					})
					.catch(error => console.error("Error loading playlist:", error));
			} else {
				console.error("Invalid playlist URL");
			}
		}

		function extractPlaylistId(url) {
			var match = url.match(/[?&]list=([^&]+)/);
			return match ? match[1] : null;
		}

		function displayPlaylist() {
			var playlistElement = document.getElementById("playlist");
			playlistElement.innerHTML = "";
			playlist.forEach((song, index) => {
				var button = document.createElement("button");
				button.textContent = song.title;
				button.onclick = function() {
					loadPlayer(song.videoId, index);
				};
				playlistElement.appendChild(button);
			});
		}

		function loadPlayer(videoId, index) {
			if (player) {
				player.destroy();
			}
			player = new YT.Player('player', {
				height: '0',
				width: '0',
				videoId: videoId,
				events: {
					'onReady': function(event) {
						onPlayerReady(event, index);
					},
					'onStateChange': onPlayerStateChange
				}
			});

			var playPauseButton = document.querySelector(".play-pause-button");
			playPauseButton.classList.remove("paused");
		}

		function onPlayerReady(event, index) {
			currentSongIndex = index;
			updateProgressBar();
			player.playVideo();
			setCurrentSong(currentSongIndex);
		}

		function onPlayerStateChange(event) {
			if (event.data === YT.PlayerState.ENDED) {
				nextSong();
			}
		}

		function previousSong() {
			currentSongIndex--;
			if (currentSongIndex < 0) {
				currentSongIndex = playlist.length - 1;
			}
			loadPlayer(playlist[currentSongIndex].videoId, currentSongIndex);
		}

		function nextSong() {
			currentSongIndex++;
			if (currentSongIndex >= playlist.length) {
				currentSongIndex = 0;
			}
			loadPlayer(playlist[currentSongIndex].videoId, currentSongIndex);
		}

		function togglePlayPause() {
			if (player) {
				if (player.getPlayerState() === YT.PlayerState.PLAYING) {
					player.pauseVideo();
				} else {
					player.playVideo();
				}
				var playPauseButton = document.querySelector(".play-pause-button");
				playPauseButton.classList.toggle("paused");
			}
		}

		function updateProgressBar() {
			progressInterval = setInterval(function() {
				var currentTime = player.getCurrentTime();
				var duration = player.getDuration();
				var progressPercentage = (currentTime / duration) * 100;
			
				// Formatear el tiempo actual y la duración total en formato mm:ss
				var currentTimeFormatted = formatTime(currentTime);
				var durationFormatted = formatTime(duration);
			
				document.getElementById("progress").style.width = progressPercentage + "%";
				document.getElementById("time-display").textContent = currentTimeFormatted + " / " + durationFormatted;
			}, 500);
			
				}
				
				function formatTime(time) {
					var minutes = Math.floor(time / 60);
					var seconds = Math.floor(time % 60);
					return padNumber(minutes) + ":" + padNumber(seconds);
				}
				
				function padNumber(number) {
					return (number < 10 ? "0" : "") + number;
				}


		function setCurrentSong(index) {
			var buttons = document.querySelectorAll("#playlist button");
			buttons.forEach((button, i) => {
				if (i === index) {
					button.classList.add("current-song");
				} else {
					button.classList.remove("current-song");
				}
			});
		}
		
		function validateAndLoadPlaylist() {
			var playlistURL = document.getElementById("playlistURL").value.trim();
			if (playlistURL !== "") {
				loadPlaylist();
			} else {
				clearPlaylist();
			}
		}

		function clearPlaylist() {
			var playlistElement = document.getElementById("playlist");
			playlistElement.innerHTML = "";
		}
		
	</script>
</body>
</html>
