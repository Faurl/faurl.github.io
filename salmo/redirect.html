<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="refresh" content="20; URL=https://faurl.github.io/salmo">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

<style type="text/css">
	body {
		  display: flex;
  justify-content: center;
	}
	video {
		transform: translateY(100px);
	}
</style>
</head>
<body>
	
<h1 style="position: absolute; transform: translateY(-10px);">Espera >:)
	<div id="countdown" style="font-size: 100%; margin-top: 3%; font-weight: bold; text-align: center; z-index: 99999;"></div>
</h1>

<video width="540" height="520" autoplay muted>
	<source src="https://faurl.github.io/multimedia-links/gameplay.mp4" type="video/mp4">
</video>
<audio autoplay >
  <source src="gameplay_audio.mp3" type="audio/mpeg">
</audio>


<script>
// Establecer la duración de la cuenta atrás en segundos
let duration = 21;

// Función para actualizar la cuenta atrás
function updateCountdown() {
  // Mostrar la cuenta atrás en el elemento
  document.getElementById('countdown').textContent = duration;

  // Decrementar el tiempo restante
  duration--;

  // Verificar si la cuenta atrás ha llegado a cero
  if (duration < 0) {
    clearInterval(countdownInterval);
    document.getElementById('countdown').textContent = 'l';
  }
}

// Actualizar la cuenta atrás cada segundo
const countdownInterval = setInterval(updateCountdown, 1000);

// Actualizar la cuenta atrás inicialmente
updateCountdown();
</script>
</body>
</html>
