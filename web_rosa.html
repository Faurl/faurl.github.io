  <!DOCTYPE html>
  <html>
  <head>
    <link rel="icon" href="https://faurl.github.io/multimedia-links/faurl4web.ico" type="image/x-icon">
    <title>Página web rouseada</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-image: linear-gradient(to bottom, #ffe6e6, #ff4d94);
        text-align: center;
        position: relative;
        min-height: 100vh;
        overflow-y: hidden;
      }
      h1 {
        color: #ff1a8c;
      }
      p {
        color: #ff4d94;
      }
      h2 {
        color: #ff66a3;
      }
      a {
        color: #cc0052;
      }
      #date {
        color: #cc0052;
        font-size: 36px;
        margin-top: 100px;
       }
    #content {
      position: relative;
      z-index: 1; /* Ensure content appears on top of the image */
      }
      #roses {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%; /* Stretch horizontally */
        height: 35%;
      }
      #color-list {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 50px;
      }
      #color-list li {
        list-style: none;
        margin: 10px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: inline-block;
      }
      #color-list li:nth-child(1) {
        background-color: #ffe6e6;
      }
      #color-list li:nth-child(2) {
        background-color: #ff1a8c;
      }
      #color-list li:nth-child(3) {
        background-color: #ff4d94;
      }
      #color-list li:nth-child(4) {
        background-color: #ff66a3;
      }
      #color-list li:nth-child(5) {
        background-color: #cc0052;
      }
    </style>
  </head>
  <body>
    <div id="content">
      <h1>Bienvenidos a la web rosa</h1>
      <p>Esta página está diseñada en tonos de rosa para crear un ambiente cálido y acogedor.</p>
      <h2>Diferentes tonos de rosa:</h2>
      <ul id="color-list">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
      <div id="date"></div>
      <p style="color: #ff1a8c">Para más información, visita nuestra <a href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQbbznUl1hyboFJGZ6D1beXgJxGQ0i7hrRugw&usqp=CAU">página de contacto</a>.</p>
    </div>
    <img id="roses" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjPp85F7SA4d9EiNr72npZVNkn57jVxHo5eQ&usqp=CAU" alt="Imagen de rosas">
    <script>
      var date = new Date();
      function displayDate() {
        var day = date.getDate();
        var month = date.getMonth() + 1;
        var year = date.getFullYear();
        var hour = date.getHours();
        var minute = date.getMinutes();
        var second = date.getSeconds();
        document.getElementById("date").innerHTML = day + "/" + month + "/" + year + " | " + hour + ":" + minute + ":" + second;
        date.setTime(date.getTime() + 1000);
      }
      setInterval(displayDate, 1000);
    </script>
  </body>
  </html>
