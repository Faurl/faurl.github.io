<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-reader</title>
    <style>
        body {
            margin-left: 2%;
        }
        #dropZone {
            width: 303px;
            height: 135px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2%;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 3px dashed darkgrey;
        }
        #dropZone:hover {
            transition: 0.4s;
            background-color: pink;
        }
        #pasteButton {
            width: 309px;
            cursor: pointer;
            margin-bottom: 2%;
        }
        #canvas {
            display: none;
        }
        #resultContainer {
            display: none;
            flex-direction: column;
            align-items: center;
            border: 2px solid black;
            background-color: lightgray;
            padding: 10px;
            max-width: 80%;
            overflow-wrap: break-word;
            word-wrap: break-word;
            word-break: break-all;
            white-space: pre-wrap;
        }
        #result {
            margin-left: 1%;
        }
        #copyButton {
            margin-top: 2%;
            margin-left: 10px;
            margin-right: 10px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Lector de Códigos QR</h1>
    <div id="dropZone">Arrastrar/Subir Imagen</div>
    <button id="pasteButton" title="Pegar Imagen desde el Portapapeles">Pegar Imagen</button>
    <input type="file" id="fileInput" accept="image/*" style="display: none;">
    <canvas id="canvas"></canvas>
    <div id="resultContainer">
        <p id="result"></p>
        <button id="copyButton">Copiar</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.3.1/dist/jsQR.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const resultContainer = document.getElementById('resultContainer');
        const resultElement = document.getElementById('result');
        const copyButton = document.getElementById('copyButton');
        const pasteButton = document.getElementById('pasteButton');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (event) => {
            event.preventDefault();
            dropZone.style.borderColor = 'coral';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#ccc';
        });
        dropZone.addEventListener('drop', (event) => {
            event.preventDefault();
            dropZone.style.borderColor = '#ccc';
            handleFile(event.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (event) => handleFile(event.target.files[0]));

        copyButton.addEventListener('click', () => {
            navigator.clipboard.writeText(resultElement.textContent)
                .then(() => alert('Texto copiodo :3'))
                .catch(() => alert('Error al copiar el texto'));
        });

        pasteButton.addEventListener('click', () => {
            pasteButton.focus();
        });

        pasteButton.addEventListener('paste', (event) => {
            const items = (event.clipboardData || window.clipboardData).items;
            for (let item of items) {
                if (item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    handleFile(blob);
                }
            }
        });

        document.addEventListener('paste', (event) => {
            if (event.target !== pasteButton) {
                const items = (event.clipboardData || window.clipboardData).items;
                for (let item of items) {
                    if (item.type.startsWith('image/')) {
                        const blob = item.getAsFile();
                        handleFile(blob);
                    }
                }
            }
        });

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    context.drawImage(img, 0, 0, canvas.width, canvas.height);

                    const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);

                    if (code) {
                        context.beginPath();
                        context.moveTo(code.location.topLeftCorner.x, code.location.topLeftCorner.y);
                        context.lineTo(code.location.topRightCorner.x, code.location.topRightCorner.y);
                        context.lineTo(code.location.bottomRightCorner.x, code.location.bottomRightCorner.y);
                        context.lineTo(code.location.bottomLeftCorner.x, code.location.bottomLeftCorner.y);
                        context.closePath();
                        context.lineWidth = 4;
                        context.strokeStyle = 'red';
                        context.stroke();

                        resultElement.textContent = `${code.data}`;
                        resultContainer.style.display = 'flex';
                    } else {
                        resultElement.textContent = 'No se detectó ningún código QR.';
                        resultContainer.style.display = 'none';
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
