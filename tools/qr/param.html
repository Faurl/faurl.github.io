<!DOCTYPE html>
<html lang="en">
<head>
    <link type="image/png" rel="icon" href="../../assets/media/icons/tools/qr/gen.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-generator</title>
    <style>
        @font-face{
            font-family: "PixelOperator";
            src: url("../../assets/fonts/PixelOperator.ttf");
        }
        :root{
            --mainfont:"PixelOperator";
        }

        body {
            background-color:black; /*darkgray*/
            font-family: var(--mainfont);
            margin: 0;
        }

        a{text-decoration: none;}
        a:hover{text-decoration: underline;}
        a:link,a:visited {color: yellow;}/*#0000ee*/
        p{margin: 20px 0 0 0}

        main{
            max-width: 550px !important;
            margin: 4%;
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
            border: 5px ridge lightgray;

            background-color: gray; /*#CFCDCA*/
            display: table;
        }

        #qrcode{
            box-sizing: border-box;
            width: 100%;
        }
        #qrcode img {
            box-sizing: border-box;
            display: block;
            margin-left: auto;
            margin-right: auto;
            min-height: 200px;
            max-height: 400px;
        }

        #error-message {
            display: none;
            color: red;
            font-size: 20px;
            padding: 3px;

            background-color: black;
        }

        #qrtext {color:white; word-break: break-all; display: none; font-size: 100%}

        #usealert{font-size:20px;display: none; padding: 5px; margin: 0 0 2px 0}

        .example{color:lightgray;}

    </style>
</head>
<body>
    <main>
    <div id="qrcode"></div>
    <p id="error-message"></p>
    <p id="qrtext"></p>
    <p id="usealert">
        To use, insert your text inside a parameter named "<span class="example">data</span>" in the url.
        <br>
        <br>
        Example:
        <br>
        https:\\exampledomain.bart\<a href="?data=textoso de EJEMPLO">?data=textoso de EJEMPLO</a>
    </p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script>
        const qrcode = document.getElementById('qrcode');
        const errorMessage = document.getElementById('error-message');
        const qrtext = document.getElementById("qrtext");

        function displayError(text){
            errorMessage.style.display = 'table';
            errorMessage.textContent=text;
        }

        // cargar parámetros url
        let params = new URLSearchParams(location.search);

        let qr_text = null;
        function loadParameters() {
          if (params.has('data')) {
            qr_text = params.get('data');
            generateQRCode();
          } else {document.getElementById("usealert").style.display="inline-block"}
        }

        function generateQRCode() {
            //const qrSize = document.getElementById('qr-size-input').value.trim();
            const text = qr_text;
            qrtext.innerHTML=qr_text;
            qrtext.style.display="block";

            qrcode.innerHTML = '';
            errorMessage.textContent = '';

            if (!text.trim()) {
                displayError('Error: The text input is empty.');
                return;
            }

            const qrOptions = {
                errorCorrectionLevel: 'L',
                version: 'auto',
               // width: qrSize || 'auto',
            };

            QRCode.toDataURL(text, qrOptions, function (error, url) {
                if (error) {
                    console.error(error);
                    displayError('Error: The data is too large to encode in a QR code.');
                } else {
                    const img = document.createElement('img');
                    img.src = url;
                    img.draggable = true;
                    qrcode.appendChild(img);
                }
            });
        }

        loadParameters();
    </script>
</body>
</html>
