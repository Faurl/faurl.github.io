<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="lock_icon.png" type="image/x-icon">
    <title>AES-256 Encrypt</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <h1>AES-256 Crypt</h1>
     <div class="form-group">
        <label for="password-input" class="tcr">Contraseña:</label>
        <div class="password-container">
            <input type="password" id="password-input" placeholder="Introduce la contraseña...">
            <button type="button" id="toggle-password"><i class="fas fa-eye-slash"></i></button>
        </div>
    </div>
    <div class="form-group">
        <label for="text-input" class="tcr">Texto:</label>
        <textarea id="text-input" rows="4" placeholder="Introduce el texto aquí..."></textarea>
    </div>
   
    <button id="encrypt-button">E n c r i p t a r</button>
    <button id="decrypt-button">D e s e n c r i p t a r</button>
    <div class="form-group"><br>
        <label for="result-output" class="tcr">Resultado:</label>
        <textarea id="result-output" rows="4" readonly></textarea>
    </div>
    <div class="form-group">
        <label for="auto-encrypt-checkbox" class="auto-mode-text">Auto <input type="checkbox" id="auto-encrypt-checkbox"> <button id="copy-button">Copiar</button></label>
        
    </div>
</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
