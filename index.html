<!DOCTYPE html>
<html>
<head>
  <title>Faurl Webbe</title>
  <link rel="icon" href="faurl4web.ico" type="image/x-icon">
  <meta http-equiv="Content-Security-Policy" content="frame-src 'self' *"> <!--'self'-->
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      height: 100vh;
      margin: 0;
      padding: 0;
    }

    .accordion {
      background-color: #f1f1f1;
      color: #333;
      cursor: pointer;
      padding: 8px;
      width: 100%;
      text-align: left;
      border: none;
      outline: none;
      transition: 0.4s;
      position: relative;
      z-index: 2;
    }

    .active, .accordion:hover {
      background-color: #ddd;
    }

    .panel {
      text-align: left;
      padding: 0;
      display: none;
      overflow: hidden;
      position: absolute;
      z-index: 3;
      width: 7.3%;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 35px);
      border: none;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <button class="accordion">Load Html files</button>
  <div class="panel">
   <!--<button onclick="cargarWeb('path'); cerrarPanel()">Texto Boton</button>-->
    <button onclick="cargarWeb('web_rosa.html'); cerrarPanel()">Cargar Web 1</button>
    <button onclick="cargarWeb('epikweb.html'); cerrarPanel()">Main Web</button>
    <button onclick="cargarWeb('codificadorZA.html'); cerrarPanel()">Codificador</button>
	<button onclick="cargarWeb('cronómetro.html'); cerrarPanel()">Cronómetro</button>
	<button onclick="cargarWeb('cumpn.html'); cerrarPanel()">link</button>
	<!--<button onclick="cargarWeb('3enraya.html'); cerrarPanel()">3 en Raya</button>-->
	<button onclick="cargarWeb('https://www.friv.com/z/games/bloxorz/game.html'); cerrarPanel()">Bloxorz [Friv.com]</button>
  </div>
  <div id="contenedor-web">
    <iframe id="cronometroFrame" src="epikweb.html"></iframe>
  </div>

  <script>
    function cargarWeb(url) {
      var contenedorWeb = document.getElementById('contenedor-web');
      contenedorWeb.innerHTML = '<iframe src="' + url + '"></iframe>';
    }

    function cerrarPanel() {
      var acc = document.getElementsByClassName("accordion");
      for (var i = 0; i < acc.length; i++) {
        acc[i].classList.remove("active");
        var panel = acc[i].nextElementSibling;
        panel.style.display = "none";
      }
    }

    var acc = document.getElementsByClassName("accordion");
    var i;

    for (i = 0; i < acc.length; i++) {
      acc[i].addEventListener("click", function() {
        this.classList.toggle("active");
        var panel = this.nextElementSibling;
        if (panel.style.display === "block") {
          panel.style.display = "none";
        } else {
          panel.style.display = "block";
        }
      });
    }
	
	
	
	window.addEventListener('keydown', function(event) {
			var iframe = document.getElementById('cronometroFrame');
			var iframeWindow = iframe.contentWindow || iframe;

			var keyCode = event.keyCode;
			if (keyCode === 32 || keyCode === 84) {
				iframeWindow.postMessage({ event: 'toggle' }, '*');
			} else if (keyCode === 82) {
				iframeWindow.postMessage({ event: 'reset' }, '*');
			} else if (keyCode === 187) {
				iframeWindow.postMessage({ event: 'increaseFontSize' }, '*');
			} else if (keyCode === 191) {
				iframeWindow.postMessage({ event: 'decreaseFontSize' }, '*');
			}
		});
	
	
	
	
  </script>
</body>
</html>
