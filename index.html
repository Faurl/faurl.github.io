  <div id="contenedor-web">
    <iframe src="epikweb.html"></iframe>
  </div>

  <script>
    function cargarWeb(url) {
      var contenedorWeb = document.getElementById('contenedor-web');
      contenedorWeb.innerHTML = '<iframe src="' + url + '"></iframe>';
    }

    function cerrarPanel() {
      var acc = document.getElementsByClassName("accordion");
      for (var i = 0; i < acc.length; i++) {
        acc[i].classList.remove("active");
        var panel = acc[i].nextElementSibling;
        panel.style.display = "none";
      }
    }

    var acc = document.getElementsByClassName("accordion");
    var i;

    for (i = 0; i < acc.length; i++) {
      acc[i].addEventListener("click", function() {
        this.classList.toggle("active");
        var panel = this.nextElementSibling;
        if (panel.style.display === "block") {
          panel.style.display = "none";
        } else {
          panel.style.display = "block";
        }
      });
    }

<script>
  var iframe = document.getElementById('contenedor-web').querySelector('iframe');
  var panel = document.querySelector('.panel');
  var timeout;

  if (window.innerWidth > 768) { // Verificar si el ancho de la ventana es mayor a 768px (ejemplo)
    iframe.addEventListener('mouseover', function() {
      timeout = setTimeout(function() {
        if (panel.style.display === 'block') {
          panel.style.display = 'none';
        }
      }, 100); // 1000 = 1s
    });

    iframe.addEventListener('mouseout', function() {
      clearTimeout(timeout);
    });
  }
</script>
