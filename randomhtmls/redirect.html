<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="refresh" content="20; URL=https://faurl.github.io/salmo">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

<style type="text/css">
	body {
		  display: flex;
  justify-content: center;
	}
	video {
		transform: translateY(100px);
	}
</style>
</head>
<body>
	
<h1 style="position: absolute;">Espera >:)
	<div id="countdown" style="font-size: 100%; margin-top: 3%; font-weight: bold; text-align: center; z-index: 99999;"></div>
</h1>

<video width="540" height="520" autoplay muted>
	<source src="../assets/video/gameplay.mp4" type="video/mp4">
</video>


<script>
let duration = 100; //en segundos

function updateCountdown() {
  document.getElementById('countdown').textContent = duration;
  duration--;
  if (duration < 0) {
    clearInterval(countdownInterval);
    document.getElementById('countdown').textContent = 'l';
  }
}

const countdownInterval = setInterval(updateCountdown, 1000);

updateCountdown();

</script>
</body>
</html>
